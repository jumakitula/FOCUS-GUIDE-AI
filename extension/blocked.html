<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Mode Active — FocusGuard AI</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #f1f5f9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        padding: 24px;
      }
      .shield { font-size: 64px; margin-bottom: 24px; }
      h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; color: #22c55e; }
      .subtitle { font-size: 16px; color: #94a3b8; margin-bottom: 24px; }
      .event-box {
        background: #1e293b;
        border-radius: 12px;
        padding: 16px 32px;
        margin-bottom: 12px;
      }
      .event-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; }
      .event-name { font-size: 20px; font-weight: 700; margin-top: 4px; }
      .countdown {
        font-size: 40px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: #22c55e;
        margin: 16px 0 32px;
      }
      button {
        background: transparent;
        border: 1px solid #475569;
        color: #94a3b8;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover { border-color: #94a3b8; color: #f1f5f9; }
    </style>
  </head>
  <body>
    <div class="shield">🛡️</div>
    <h1>Focus Mode Active</h1>
    <p class="subtitle">You blocked this site to stay focused.</p>

    <div class="event-box">
      <div class="event-label">Focusing for</div>
      <div class="event-name" id="eventName">Loading…</div>
    </div>

    <div class="countdown" id="countdown">--:--:--</div>

    <button id="overrideBtn">Emergency Override</button>

    <script>
      const API_BASE = "http://localhost:8000";

      function formatCountdown(endTimeStr) {
        const end = new Date(endTimeStr).getTime();
        const now = Date.now();
        const diff = Math.max(0, end - now);
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        return [h, m, s].map((v) => String(v).padStart(2, "0")).join(":");
      }

      async function init() {
        const { activeSession } = await chrome.storage.local.get("activeSession");
        if (!activeSession) return;

        document.getElementById("eventName").textContent = activeSession.event_title;

        const tick = () => {
          document.getElementById("countdown").textContent = formatCountdown(activeSession.end_time);
        };
        tick();
        setInterval(tick, 1000);

        document.getElementById("overrideBtn").addEventListener("click", async () => {
          const reason = prompt("Why do you need to access this site? (required)");
          if (!reason || !reason.trim()) return;

          try {
            await fetch(`${API_BASE}/focus/override`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                session_id: activeSession.session_id,
                reason: reason.trim(),
                user_email: activeSession.user_email,
              }),
            });
            window.history.back();
          } catch (err) {
            alert("Could not process override. Check your connection.");
          }
        });
      }

      init();
    </script>
  </body>
</html>
